<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniEvent - University Event Management</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .event-card { transition: transform 0.2s; height: 100%; }
        .event-card:hover { transform: scale(1.02); }
        .event-image { height: 200px; object-fit: cover; }
        .hero-section { background: #003366; color: white; padding: 60px 0; }
    </style>
</head>
<body>
    <header class="hero-section text-center">
        <h1>UniEvent Portal</h1>
        <p>Official University Event Management System</p>
    </header>

    <div class="container my-5">
        <h2 class="mb-4">Current University Events</h2>
        <div class="row g-4">
            {% for event in events %}
            <div class="col-md-4">
                <div class="card event-card shadow-sm">
                    <img src="{{ event.image_url }}" class="card-img-top event-image" alt="Event Poster">
                    <div class="card-body">
                        <h5 class="card-title text-primary">{{ event.name }}</h5>
                        <p class="text-muted small"><strong>Venue:</strong> {{ event.venue }}<br>
                        <strong>Date:</strong> {{ event.date }}</p>
                        <p class="card-text">{{ event.description[:100] }}...</p>
                        <button class="btn btn-outline-primary btn-sm w-100">Register Now</button>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
